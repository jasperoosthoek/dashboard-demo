<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dashboard Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Dashboard demo built with React, Zustand and React-Bootstrap." />
    <meta name="theme-color" content="#2C3E50" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dashboard" />
    <link rel="icon" type="image/x-icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      window.__pwaInstallObserved = false;
      window.__pwaInstalled = false;
      window.__pwaPromptEvent = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        window.__pwaInstallObserved = true;
        window.__pwaPromptEvent = e;
        console.log('[PWA] beforeinstallprompt fired', {
          platforms: e.platforms,
          isSecureContext: window.isSecureContext,
          serviceWorkerSupported: 'serviceWorker' in navigator,
        });
      });
      window.addEventListener('appinstalled', function () {
        window.__pwaInstalled = true;
        console.log('[PWA] appinstalled fired');
      });
      console.log('[PWA] diagnostic ready', {
        isSecureContext: window.isSecureContext,
        serviceWorkerSupported: 'serviceWorker' in navigator,
        displayModeStandalone: window.matchMedia('(display-mode: standalone)').matches,
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
